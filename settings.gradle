pluginManagement {
    repositories {
        mavenLocal()
        mavenCentral()
        maven {
            url teRepoUrl
            credentials {
                username teRepoUser
                password teRepoPassword
            }
        }
    }
}

plugins {
    id "com.gradle.enterprise" version "3.7.2"
}

gradle.taskGraph.whenReady { graph ->
    if (graph.hasTask(':useGradleEnterprise')) {
        gradleEnterprise {
            // configuration
            server = "https://gradle.releng.gcp.thousandeyes.com"
            allowUntrustedServer = true

            buildScan {
                publishAlways()
            }
        }

        buildCache {
            remote(HttpBuildCache) {
                push = true
            }
        }
    }
}

rootProject.name = 'thousandeyes-java-sdk'
include 'thousandeyes-java-sdk-administrative'
include 'thousandeyes-java-sdk-agents'
include 'thousandeyes-java-sdk-alerts'
include 'thousandeyes-java-sdk-credentials'
include 'thousandeyes-java-sdk-dashboards'
include 'thousandeyes-java-sdk-endpoint-agents'
include 'thousandeyes-java-sdk-endpoint-instant-tests'
include 'thousandeyes-java-sdk-endpoint-labels'
include 'thousandeyes-java-sdk-endpoint-test-results'
include 'thousandeyes-java-sdk-endpoint-tests'
include 'thousandeyes-java-sdk-instant-tests'
include 'thousandeyes-java-sdk-internet-insights'
include 'thousandeyes-java-sdk-labels'
include 'thousandeyes-java-sdk-snapshots'
include 'thousandeyes-java-sdk-streaming'
include 'thousandeyes-java-sdk-tags'
include 'thousandeyes-java-sdk-test-results'
include 'thousandeyes-java-sdk-test-templates'
include 'thousandeyes-java-sdk-tests'
include 'thousandeyes-java-sdk-usage'
include 'thousandeyes-java-sdk-wan-insights'
